  <rect width="1200" height="800" fill="#ebe8e1"/>
  <text x="80" y="90" font-family="Arial, sans-serif" font-size="28" fill="#1c261f">Цепочка триггера + «банка» возбуждения</text>

  <rect x="80" y="140" width="1040" height="560" rx="20" fill="none" stroke="#1c261f" stroke-width="3"/>
  <text x="140" y="220" font-family="Arial" font-size="18" fill="#1c261f">Страх → Тревога → Напряжение → Ускорение → Быстрая эякуляция</text>
  <line x1="140" y1="250" x2="980" y2="250" stroke="#8a93a6" stroke-width="2" stroke-dasharray="6 6"/>
  <rect x="140" y="320" width="280" height="200" rx="16" fill="none" stroke="#d4af37" stroke-width="4"/>
  <rect x="170" y="340" width="220" height="160" rx="12" fill="none" stroke="#1c261f" stroke-width="3"/>
  <text x="185" y="420" font-family="Arial" font-size="18" fill="#1c261f">«Банка»
  возбуждения</text>
