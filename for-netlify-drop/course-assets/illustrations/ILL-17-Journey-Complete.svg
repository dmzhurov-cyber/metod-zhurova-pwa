<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="background: #ebe8e1;">
  <defs>
    <linearGradient id="pathGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1c261f;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#8fae88;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#d4af37;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Фон -->
  <rect x="0" y="0" width="800" height="400" fill="#ebe8e1"/>
  
  <!-- Путь трансформации -->
  <path d="M 50 300 Q 200 200, 400 150 Q 600 100, 750 150" stroke="url(#pathGradient)" stroke-width="8" fill="none"/>
  
  <!-- Начальная точка (темнота) -->
  <circle cx="50" cy="300" r="20" fill="#1c261f"/>
  <text x="50" y="340" font-family="Georgia, serif" font-size="12" fill="#1c261f" text-anchor="middle">Начало</text>
  <text x="50" y="355" font-family="Arial, sans-serif" font-size="10" fill="#666" text-anchor="middle">Темнота</text>
  
  <!-- Промежуточные точки -->
  <circle cx="200" cy="200" r="15" fill="#8fae88" opacity="0.7"/>
  <circle cx="400" cy="150" r="15" fill="#6d9a8f" opacity="0.7"/>
  <circle cx="600" cy="100" r="15" fill="#ff6b35" opacity="0.7"/>
  
  <!-- Конечная точка (свет) -->
  <circle cx="750" cy="150" r="25" fill="url(#goldGrad5)"/>
  <circle cx="750" cy="150" r="15" fill="#ffffff"/>
  <text x="750" y="190" font-family="Georgia, serif" font-size="14" fill="#1c261f" text-anchor="middle" font-weight="bold">Конец</text>
  <text x="750" y="205" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">Свет</text>
  
  <!-- Заголовок -->
  <text x="400" y="50" font-family="Georgia, serif" font-size="22" fill="#1c261f" text-anchor="middle" font-weight="bold">Путь завершен</text>
  <text x="400" y="75" font-family="Georgia, serif" font-size="14" fill="#666" text-anchor="middle">От темноты к свету. От отчаяния к мастерству.</text>
</svg>




