<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 700" style="background: #ebe8e1;">
  <defs>
    <linearGradient id="muscleGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8fae88;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#2a4a8a;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Фон -->
  <rect x="0" y="0" width="600" height="700" fill="#ebe8e1"/>
  
  <!-- Схематическое изображение таза -->
  <ellipse cx="300" cy="400" rx="200" ry="150" fill="#f0f0f0" stroke="#1c261f" stroke-width="2"/>
  
  <!-- ЛК-мышцы (тазовое дно) -->
  <path d="M 150 450 Q 300 500, 450 450" stroke="#8fae88" stroke-width="8" fill="none"/>
  <path d="M 150 450 Q 300 480, 450 450" stroke="#8fae88" stroke-width="8" fill="none" opacity="0.5"/>
  
  <!-- Уретра -->
  <ellipse cx="300" cy="450" rx="30" ry="80" fill="#6d9a8f" opacity="0.3" stroke="#6d9a8f" stroke-width="2"/>
  
  <!-- Простата -->
  <circle cx="300" cy="420" r="25" fill="#ff6b35" opacity="0.5" stroke="#ff6b35" stroke-width="2"/>
  
  <!-- Подписи -->
  <line x1="200" y1="500" x2="220" y2="480" stroke="#1c261f" stroke-width="1"/>
  <text x="230" y="475" font-family="Arial, sans-serif" font-size="12" fill="#1c261f" font-weight="bold">ЛК-мышцы</text>
  
  <line x1="300" y1="500" x2="300" y2="530" stroke="#1c261f" stroke-width="1"/>
  <text x="310" y="545" font-family="Arial, sans-serif" font-size="11" fill="#1c261f">Уретра</text>
  
  <line x1="300" y1="395" x2="280" y2="350" stroke="#1c261f" stroke-width="1"/>
  <text x="270" y="345" font-family="Arial, sans-serif" font-size="11" fill="#1c261f">Простата</text>
  
  <!-- Заголовок -->
  <text x="300" y="50" font-family="Georgia, serif" font-size="22" fill="#1c261f" text-anchor="middle" font-weight="bold">Анатомия ЛК-мышц</text>
  <text x="300" y="75" font-family="Georgia, serif" font-size="14" fill="#666" text-anchor="middle">Единственные мышцы, которые могут контролировать эякуляторный рефлекс</text>
</svg>




