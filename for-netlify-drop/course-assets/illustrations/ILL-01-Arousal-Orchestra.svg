<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" style="background: #ebe8e1;">
  <defs>
    <linearGradient id="goldGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8941f;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Фон -->
  <rect x="0" y="0" width="800" height="600" fill="#ebe8e1"/>
  
  <!-- Сцена -->
  <rect x="50" y="100" width="700" height="400" fill="#1c261f" stroke="#d4af37" stroke-width="2"/>
  
  <!-- Дирижер (Мозг) - в центре -->
  <circle cx="400" cy="200" r="40" fill="url(#goldGrad2)"/>
  <text x="400" y="210" font-family="Arial" font-size="12" fill="#1c261f" text-anchor="middle" font-weight="bold">МОЗГ</text>
  <text x="400" y="225" font-family="Arial" font-size="10" fill="#1c261f" text-anchor="middle">Дирижер</text>
  
  <!-- Палочка дирижера -->
  <line x1="400" y1="200" x2="400" y2="150" stroke="#d4af37" stroke-width="3"/>
  <circle cx="400" cy="150" r="5" fill="#d4af37"/>
  
  <!-- Оркестр вокруг -->
  
  <!-- Скрипки (Нервная система) -->
  <ellipse cx="200" cy="300" rx="30" ry="50" fill="#8fae88" opacity="0.7"/>
  <line x1="200" y1="250" x2="200" y2="350" stroke="#8fae88" stroke-width="2"/>
  <text x="200" y="420" font-family="Arial" font-size="11" fill="#1c261f" text-anchor="middle">Нервная</text>
  <text x="200" y="435" font-family="Arial" font-size="11" fill="#1c261f" text-anchor="middle">система</text>
  
  <!-- Духовые (Гормоны) -->
  <rect x="300" y="280" width="40" height="60" rx="5" fill="#6d9a8f" opacity="0.7"/>
  <text x="320" y="420" font-family="Arial" font-size="11" fill="#1c261f" text-anchor="middle">Гормоны</text>
  
  <!-- Ритм-секция (Кровь) -->
  <circle cx="500" cy="300" r="25" fill="#ff6b35" opacity="0.7"/>
  <text x="500" y="420" font-family="Arial" font-size="11" fill="#1c261f" text-anchor="middle">Кровь</text>
  
  <!-- Ударные (Сердце) -->
  <circle cx="600" cy="300" r="30" fill="#d4af37" opacity="0.7"/>
  <text x="600" y="420" font-family="Arial" font-size="11" fill="#1c261f" text-anchor="middle">Сердце</text>
  
  <!-- Мелодия (Дыхание) - волны -->
  <path d="M 150 450 Q 175 420, 200 450 T 250 450" stroke="#6d9a8f" stroke-width="3" fill="none" opacity="0.7"/>
  <text x="200" y="480" font-family="Arial" font-size="11" fill="#1c261f" text-anchor="middle">Дыхание</text>
  
  <!-- Бас (Мышцы) -->
  <rect x="550" y="280" width="60" height="40" rx="5" fill="#8b6f47" opacity="0.7"/>
  <text x="580" y="480" font-family="Arial" font-size="11" fill="#1c261f" text-anchor="middle">Мышцы</text>
  
  <!-- Связи от дирижера к инструментам -->
  <line x1="400" y1="200" x2="200" y2="300" stroke="#d4af37" stroke-width="1" opacity="0.3" stroke-dasharray="3,3"/>
  <line x1="400" y1="200" x2="320" y2="310" stroke="#d4af37" stroke-width="1" opacity="0.3" stroke-dasharray="3,3"/>
  <line x1="400" y1="200" x2="500" y2="300" stroke="#d4af37" stroke-width="1" opacity="0.3" stroke-dasharray="3,3"/>
  <line x1="400" y1="200" x2="600" y2="300" stroke="#d4af37" stroke-width="1" opacity="0.3" stroke-dasharray="3,3"/>
  
  <!-- Заголовок -->
  <text x="400" y="50" font-family="Georgia, serif" font-size="22" fill="#1c261f" text-anchor="middle" font-weight="bold">Оркестр возбуждения</text>
  <text x="400" y="75" font-family="Georgia, serif" font-size="14" fill="#666" text-anchor="middle">Ты можешь быть дирижером</text>
</svg>




