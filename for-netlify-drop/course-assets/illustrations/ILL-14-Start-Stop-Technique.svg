<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="background: #ebe8e1;">
  <defs>
    <linearGradient id="arousalWave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6d9a8f;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#8fae88;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#ff6b35;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Фон -->
  <rect x="0" y="0" width="800" height="500" fill="#ebe8e1"/>
  
  <!-- Временная линия -->
  <line x1="100" y1="400" x2="700" y2="400" stroke="#1c261f" stroke-width="2"/>
  
  <!-- Волна возбуждения с паузами -->
  <!-- Цикл 1 -->
  <path d="M 100 400 Q 150 350, 200 400" stroke="url(#arousalWave)" stroke-width="4" fill="none"/>
  <line x1="200" y1="400" x2="250" y2="400" stroke="#d4af37" stroke-width="3" stroke-dasharray="5,5"/>
  
  <!-- Цикл 2 -->
  <path d="M 250 400 Q 300 350, 350 400" stroke="url(#arousalWave)" stroke-width="4" fill="none"/>
  <line x1="350" y1="400" x2="400" y2="400" stroke="#d4af37" stroke-width="3" stroke-dasharray="5,5"/>
  
  <!-- Цикл 3 -->
  <path d="M 400 400 Q 450 350, 500 400" stroke="url(#arousalWave)" stroke-width="4" fill="none"/>
  <line x1="500" y1="400" x2="550" y2="400" stroke="#d4af37" stroke-width="3" stroke-dasharray="5,5"/>
  
  <!-- Цикл 4 -->
  <path d="M 550 400 Q 600 350, 650 400" stroke="url(#arousalWave)" stroke-width="4" fill="none"/>
  
  <!-- Метки -->
  <text x="150" y="330" font-family="Arial, sans-serif" font-size="11" fill="#1c261f" text-anchor="middle">Старт</text>
  <text x="225" y="380" font-family="Arial, sans-serif" font-size="11" fill="#d4af37" text-anchor="middle" font-weight="bold">СТОП</text>
  
  <text x="300" y="330" font-family="Arial, sans-serif" font-size="11" fill="#1c261f" text-anchor="middle">Старт</text>
  <text x="375" y="380" font-family="Arial, sans-serif" font-size="11" fill="#d4af37" text-anchor="middle" font-weight="bold">СТОП</text>
  
  <text x="450" y="330" font-family="Arial, sans-serif" font-size="11" fill="#1c261f" text-anchor="middle">Старт</text>
  <text x="525" y="380" font-family="Arial, sans-serif" font-size="11" fill="#d4af37" text-anchor="middle" font-weight="bold">СТОП</text>
  
  <!-- Заголовок -->
  <text x="400" y="50" font-family="Georgia, serif" font-size="22" fill="#1c261f" text-anchor="middle" font-weight="bold">Техника старт-стоп</text>
  <text x="400" y="75" font-family="Georgia, serif" font-size="14" fill="#666" text-anchor="middle">Остановка и возобновление стимуляции</text>
</svg>




