<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" style="background: #ebe8e1;">
  <defs>
    <linearGradient id="mountainGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e0e0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0c0c0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Фон -->
  <rect x="0" y="0" width="800" height="600" fill="#ebe8e1"/>
  
  <!-- Гора -->
  <polygon points="0,600 200,400 400,200 600,300 800,500 800,600" fill="url(#mountainGradient)" stroke="#1c261f" stroke-width="2"/>
  
  <!-- Препятствие (скала) -->
  <polygon points="500,350 550,250 600,280 580,380" fill="#8b6f47" stroke="#1c261f" stroke-width="2"/>
  <text x="550" y="300" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">Препятствие</text>
  
  <!-- Альпинист -->
  <circle cx="450" cy="300" r="15" fill="#1c261f"/>
  <rect x="440" y="315" width="20" height="30" fill="#8fae88"/>
  <line x1="450" y1="300" x2="450" y2="315" stroke="#1c261f" stroke-width="2"/>
  
  <!-- Путь вокруг препятствия -->
  <path d="M 450 300 Q 480 280, 510 290 Q 540 300, 570 320" stroke="#d4af37" stroke-width="3" fill="none" stroke-dasharray="5,5"/>
  
  <!-- Вершина -->
  <circle cx="600" cy="200" r="20" fill="url(#goldGrad5)"/>
  <text x="600" y="175" font-family="Georgia, serif" font-size="14" fill="#1c261f" text-anchor="middle" font-weight="bold">Вершина</text>
  
  <!-- Заголовок -->
  <text x="400" y="50" font-family="Georgia, serif" font-size="22" fill="#1c261f" text-anchor="middle" font-weight="bold">Альпинист</text>
  <text x="400" y="75" font-family="Georgia, serif" font-size="14" fill="#666" text-anchor="middle">Найди путь вокруг препятствия. Продолжи подъем.</text>
</svg>




