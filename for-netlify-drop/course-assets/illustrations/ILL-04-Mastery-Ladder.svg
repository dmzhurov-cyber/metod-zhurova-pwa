<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" style="background: #ebe8e1;">
  <defs>
    <linearGradient id="ladderGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8941f;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Фон -->
  <rect x="0" y="0" width="600" height="800" fill="#ebe8e1"/>
  
  <!-- Лестница -->
  <!-- Боковые стойки -->
  <rect x="200" y="100" width="20" height="600" fill="url(#ladderGradient)"/>
  <rect x="380" y="100" width="20" height="600" fill="url(#ladderGradient)"/>
  
  <!-- Ступени -->
  <!-- Ступень 1 (внизу) -->
  <rect x="200" y="600" width="200" height="30" fill="#8fae88" opacity="0.7"/>
  <text x="300" y="620" font-family="Georgia, serif" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">Уровень 1: Эякуляторный оргазм</text>
  <text x="300" y="640" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">Ты здесь</text>
  
  <!-- Ступень 2 -->
  <rect x="200" y="480" width="200" height="30" fill="#6d9a8f" opacity="0.5"/>
  <text x="300" y="500" font-family="Georgia, serif" font-size="12" fill="#1c261f" text-anchor="middle">Уровень 2: Множественный</text>
  
  <!-- Ступень 3 -->
  <rect x="200" y="360" width="200" height="30" fill="#6d9a8f" opacity="0.5"/>
  <text x="300" y="380" font-family="Georgia, serif" font-size="12" fill="#1c261f" text-anchor="middle">Уровень 3: Длительный</text>
  
  <!-- Ступень 4 -->
  <rect x="200" y="240" width="200" height="30" fill="#6d9a8f" opacity="0.5"/>
  <text x="300" y="260" font-family="Georgia, serif" font-size="12" fill="#1c261f" text-anchor="middle">Уровень 4: Бесконечный</text>
  
  <!-- Ступень 5 (вверху) -->
  <rect x="200" y="120" width="200" height="30" fill="#d4af37" opacity="0.6"/>
  <text x="300" y="140" font-family="Georgia, serif" font-size="12" fill="#1c261f" text-anchor="middle" font-weight="bold">Уровень 5: Секс-медитация</text>
  
  <!-- Человек на первой ступени -->
  <circle cx="300" cy="570" r="20" fill="#1c261f"/>
  <rect x="285" y="590" width="30" height="40" fill="#8fae88"/>
  <line x1="300" y1="570" x2="300" y2="590" stroke="#1c261f" stroke-width="3"/>
  
  <!-- Стрелка вверх -->
  <path d="M 300 550 L 300 150" stroke="#d4af37" stroke-width="2" fill="none" marker-end="url(#arrowUp)"/>
  <defs>
    <marker id="arrowUp" markerWidth="10" markerHeight="10" refX="5" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#d4af37"/>
    </marker>
  </defs>
  
  <!-- Заголовок -->
  <text x="300" y="50" font-family="Georgia, serif" font-size="22" fill="#1c261f" text-anchor="middle" font-weight="bold">Лестница мастерства</text>
  <text x="300" y="75" font-family="Georgia, serif" font-size="14" fill="#666" text-anchor="middle">Пять уровней. Твой первый шаг.</text>
</svg>




