<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" style="background: #ebe8e1;">
  <defs>
    <pattern id="grassPattern" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="#8b9a6b" opacity="0.3"/>
    </pattern>
  </defs>
  
  <!-- Фон - поле -->
  <rect x="0" y="0" width="800" height="600" fill="url(#grassPattern)"/>
  
  <!-- Мины (триггеры) - скрытые под землей -->
  <!-- Мина 1 -->
  <circle cx="200" cy="300" r="30" fill="#d32f2f" opacity="0.6"/>
  <circle cx="200" cy="300" r="20" fill="#ff6b35" opacity="0.8"/>
  <text x="200" y="305" font-family="Arial" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">!</text>
  <text x="200" y="340" font-family="Arial" font-size="10" fill="#1c261f" text-anchor="middle">Триггер 1</text>
  
  <!-- Мина 2 -->
  <circle cx="400" cy="250" r="30" fill="#d32f2f" opacity="0.6"/>
  <circle cx="400" cy="250" r="20" fill="#ff6b35" opacity="0.8"/>
  <text x="400" y="255" font-family="Arial" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">!</text>
  <text x="400" y="290" font-family="Arial" font-size="10" fill="#1c261f" text-anchor="middle">Триггер 2</text>
  
  <!-- Мина 3 -->
  <circle cx="600" cy="350" r="30" fill="#d32f2f" opacity="0.6"/>
  <circle cx="600" cy="350" r="20" fill="#ff6b35" opacity="0.8"/>
  <text x="600" y="355" font-family="Arial" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">!</text>
  <text x="600" y="390" font-family="Arial" font-size="10" fill="#1c261f" text-anchor="middle">Триггер 3</text>
  
  <!-- Человек идет по полю -->
  <circle cx="100" cy="400" r="25" fill="#8b6f47"/>
  <rect x="85" y="425" width="30" height="50" fill="#8fae88"/>
  <line x1="100" y1="400" x2="100" y2="425" stroke="#1c261f" stroke-width="3"/>
  
  <!-- Путь (опасный) -->
  <path d="M 100 400 Q 200 350, 300 380 Q 400 410, 500 400 Q 600 390, 700 400" stroke="#d4af37" stroke-width="2" fill="none" stroke-dasharray="5,5" opacity="0.5"/>
  
  <!-- Предупреждающий знак -->
  <polygon points="50,100 100,100 120,140 100,180 50,180 30,140" fill="#ff6b35" stroke="#d4af37" stroke-width="2"/>
  <text x="75" y="145" font-family="Arial" font-size="16" fill="#ffffff" text-anchor="middle" font-weight="bold">!</text>
  
  <!-- Заголовок -->
  <text x="400" y="50" font-family="Georgia, serif" font-size="22" fill="#1c261f" text-anchor="middle" font-weight="bold">Поле с минами</text>
  <text x="400" y="75" font-family="Georgia, serif" font-size="14" fill="#666" text-anchor="middle">Триггеры скрыты. Ты не знаешь, где опасность.</text>
</svg>




