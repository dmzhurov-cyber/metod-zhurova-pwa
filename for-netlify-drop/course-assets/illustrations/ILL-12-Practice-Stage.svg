<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" style="background: #ebe8e1;">
  <defs>
    <linearGradient id="stageGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#d4af37;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  
  <!-- Фон -->
  <rect x="0" y="0" width="800" height="600" fill="#ebe8e1"/>
  
  <!-- Сцена (слева - провал) -->
  <rect x="50" y="200" width="300" height="300" fill="url(#stageGradient)" stroke="#d32f2f" stroke-width="3"/>
  <text x="200" y="240" font-family="Georgia, serif" font-size="18" fill="#d32f2f" text-anchor="middle" font-weight="bold">Сцена</text>
  <text x="200" y="260" font-family="Arial, sans-serif" font-size="12" fill="#666" text-anchor="middle">Без тренировки</text>
  
  <!-- Музыкант на сцене (проваливается) -->
  <circle cx="200" cy="350" r="30" fill="#1c261f" opacity="0.7"/>
  <rect x="185" y="380" width="30" height="50" fill="#8fae88" opacity="0.7"/>
  <text x="200" y="460" font-family="Arial, sans-serif" font-size="11" fill="#d32f2f" text-anchor="middle">Провал</text>
  
  <!-- Тренировочная площадка (справа - успех) -->
  <rect x="450" y="200" width="300" height="300" fill="#6d9a8f" opacity="0.2" stroke="#6d9a8f" stroke-width="3"/>
  <text x="600" y="240" font-family="Georgia, serif" font-size="18" fill="#1c261f" text-anchor="middle" font-weight="bold">Тренировка</text>
  <text x="600" y="260" font-family="Arial, sans-serif" font-size="12" fill="#666" text-anchor="middle">Осознанная мастурбация</text>
  
  <!-- Музыкант на тренировке (успех) -->
  <circle cx="600" cy="350" r="30" fill="#1c261f"/>
  <rect x="585" y="380" width="30" height="50" fill="#8fae88"/>
  <text x="600" y="460" font-family="Arial, sans-serif" font-size="11" fill="#1c261f" text-anchor="middle">Успех</text>
  
  <!-- Стрелка от тренировки к сцене -->
  <path d="M 450 350 L 350 350" stroke="#d4af37" stroke-width="3" fill="none" marker-end="url(#arrow3)"/>
  <defs>
    <marker id="arrow3" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#d4af37"/>
    </marker>
  </defs>
  
  <!-- Заголовок -->
  <text x="400" y="50" font-family="Georgia, serif" font-size="22" fill="#1c261f" text-anchor="middle" font-weight="bold">Тренировочная площадка</text>
  <text x="400" y="75" font-family="Georgia, serif" font-size="14" fill="#666" text-anchor="middle">Сначала тренируйся. Потом выходи на сцену.</text>
</svg>




