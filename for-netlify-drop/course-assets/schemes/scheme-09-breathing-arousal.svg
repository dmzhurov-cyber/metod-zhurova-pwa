<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 528" role="img" aria-label="">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060a0e"/><stop offset="100%" stop-color="#0c1218"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#g)"/>
  <text x="360" y="36" text-anchor="middle" fill="#99f7ff" font-family="system-ui,Segoe UI,sans-serif" font-size="15" font-weight="700" letter-spacing="0.06em">ДЫХАНИЕ И ШКАЛА ВОЗБУЖДЕНИЯ</text>

  <text x="360" y="68" text-anchor="middle" fill="#00f1fe" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Влияние дыхания на возбуждение</text>
  <ellipse cx="200" cy="128" rx="58" ry="42" fill="rgba(153,247,255,0.14)" stroke="#99f7ff" stroke-width="1.6"/>
    <text x="200" y="124" fill="#eaeef6" font-family="system-ui,Segoe UI,sans-serif" font-size="11" text-anchor="middle" font-weight="600">Лёгкие</text>
  <ellipse cx="360" cy="128" rx="46" ry="38" fill="rgba(255,107,107,0.12)" stroke="#ff6b6b" stroke-width="1.4"/>
    <text x="360" y="124" fill="#eaeef6" font-family="system-ui,Segoe UI,sans-serif" font-size="11" text-anchor="middle" font-weight="600">Сердце</text>
  <ellipse cx="520" cy="128" rx="58" ry="42" fill="rgba(153,247,255,0.1)" stroke="#99f7ff" stroke-width="1.5"/>
    <text x="520" y="124" fill="#eaeef6" font-family="system-ui,Segoe UI,sans-serif" font-size="11" text-anchor="middle" font-weight="600">НС</text>
  <path d="M260 128 L318 128" stroke="#5dcf8c" stroke-width="2" marker-end="url(#m2)"/>
  <path d="M408 128 L460 128" stroke="#5dcf8c" stroke-width="2" marker-end="url(#m2)"/>
  <path d="M520 172 Q 360 208 200 172" stroke="#ff6b6b" stroke-width="1.5" fill="none" stroke-dasharray="5 5" opacity="0.75"/>
  <defs><marker id="m2" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#5dcf8c"/></marker></defs>

  <rect x="48" y="218" width="300" height="218" rx="14" fill="rgba(255,107,107,0.07)" stroke="#ff6b6b" stroke-width="1"/>
    <text x="198" y="240" fill="#ff6b6b" font-family="system-ui,Segoe UI,sans-serif" font-size="12" text-anchor="middle" font-weight="600">Поверхностное дыхание</text>
    <text x="60" y="262" fill="#eaeef6" font-family="system-ui,Segoe UI,sans-serif" font-size="10" text-anchor="start" >• Быстрое, неглубокое</text>
    <text x="60" y="280" fill="#eaeef6" font-family="system-ui,Segoe UI,sans-serif" font-size="10" text-anchor="start" >• Симпатическая активация</text>
    <text x="60" y="298" fill="#eaeef6" font-family="system-ui,Segoe UI,sans-serif" font-size="10" text-anchor="start" >• Рост стресса</text>
    <text x="60" y="322" fill="#ff6b6b" font-family="system-ui,Segoe UI,sans-serif" font-size="10" text-anchor="start" font-weight="600">→ усиливает возбуждение</text>
    <text x="60" y="342" fill="#ff6b6b" font-family="system-ui,Segoe UI,sans-serif" font-size="10" text-anchor="start" font-weight="600">→ риск ускорения эякуляции</text>
    <text x="60" y="368" fill="#9aa3b0" font-family="system-ui,Segoe UI,sans-serif" font-size="10" text-anchor="start" >Часто при ПЭ — избегать в практике</text>

  <rect x="368" y="218" width="304" height="218" rx="14" fill="rgba(93,207,140,0.08)" stroke="#5dcf8c" stroke-width="1"/>
    <text x="520" y="240" fill="#5dcf8c" font-family="system-ui,Segoe UI,sans-serif" font-size="12" text-anchor="middle" font-weight="600">Глубокое дыхание</text>
    <text x="380" y="262" fill="#eaeef6" font-family="system-ui,Segoe UI,sans-serif" font-size="10" text-anchor="start" >• Медленное, диафрагмальное</text>
    <text x="380" y="280" fill="#eaeef6" font-family="system-ui,Segoe UI,sans-serif" font-size="10" text-anchor="start" >• Парасимпатика</text>
    <text x="380" y="298" fill="#eaeef6" font-family="system-ui,Segoe UI,sans-serif" font-size="10" text-anchor="start" >• Снижение стресса</text>
    <text x="380" y="322" fill="#5dcf8c" font-family="system-ui,Segoe UI,sans-serif" font-size="10" text-anchor="start" font-weight="600">→ снижает возбуждение</text>
    <text x="380" y="342" fill="#5dcf8c" font-family="system-ui,Segoe UI,sans-serif" font-size="10" text-anchor="start" font-weight="600">→ больше окна для контроля</text>
    <text x="380" y="368" fill="#9aa3b0" font-family="system-ui,Segoe UI,sans-serif" font-size="10" text-anchor="start" >4-7-8 и спокойный выдох</text>

  <rect x="48" y="448" width="624" height="52" rx="12" fill="rgba(153,247,255,0.08)" stroke="#99f7ff" stroke-width="1"/>
    <text x="360" y="472" fill="#eaeef6" font-family="system-ui,Segoe UI,sans-serif" font-size="10" text-anchor="middle" >4-7-8: вдох 4с — пауза 7с — выдох 8с → парасимпатика → ниже уровень возбуждения</text>

</svg>