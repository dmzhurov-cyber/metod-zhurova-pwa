<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" style="background: #1c261f;">
  <defs>
    <linearGradient id="goldGrad7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8941f;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Фон - сцена -->
  <rect x="0" y="0" width="800" height="600" fill="#1c261f"/>
  
  <!-- Сцена -->
  <rect x="50" y="100" width="700" height="400" fill="#1a2a40" stroke="#d4af37" stroke-width="2"/>
  
  <!-- Дирижер (в центре) -->
  <circle cx="400" cy="200" r="50" fill="url(#goldGrad7)"/>
  <text x="400" y="210" font-family="Arial, sans-serif" font-size="14" fill="#1c261f" text-anchor="middle" font-weight="bold">ДИРИЖЕР</text>
  
  <!-- Палочка -->
  <line x1="400" y1="200" x2="400" y2="120" stroke="#d4af37" stroke-width="4"/>
  <circle cx="400" cy="120" r="8" fill="#d4af37"/>
  
  <!-- Оркестр играет вместе -->
  <!-- Скрипки -->
  <ellipse cx="200" cy="300" rx="40" ry="60" fill="#8fae88" opacity="0.8"/>
  <ellipse cx="600" cy="300" rx="40" ry="60" fill="#8fae88" opacity="0.8"/>
  
  <!-- Духовые -->
  <rect x="300" y="280" width="50" height="70" rx="5" fill="#6d9a8f" opacity="0.8"/>
  <rect x="450" y="280" width="50" height="70" rx="5" fill="#6d9a8f" opacity="0.8"/>
  
  <!-- Ударные -->
  <circle cx="250" cy="400" r="30" fill="#ff6b35" opacity="0.8"/>
  <circle cx="550" cy="400" r="30" fill="#ff6b35" opacity="0.8"/>
  
  <!-- Волны музыки (гармония) -->
  <path d="M 100 200 Q 200 150, 300 200 T 500 200 T 700 200" stroke="#d4af37" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M 100 250 Q 200 200, 300 250 T 500 250 T 700 250" stroke="#d4af37" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M 100 300 Q 200 250, 300 300 T 500 300 T 700 300" stroke="#d4af37" stroke-width="3" fill="none" opacity="0.6"/>
  
  <!-- Связи от дирижера -->
  <line x1="400" y1="200" x2="200" y2="300" stroke="#d4af37" stroke-width="1" opacity="0.4"/>
  <line x1="400" y1="200" x2="600" y2="300" stroke="#d4af37" stroke-width="1" opacity="0.4"/>
  <line x1="400" y1="200" x2="325" y2="315" stroke="#d4af37" stroke-width="1" opacity="0.4"/>
  <line x1="400" y1="200" x2="475" y2="315" stroke="#d4af37" stroke-width="1" opacity="0.4"/>
  
  <!-- Заголовок -->
  <text x="400" y="50" font-family="Georgia, serif" font-size="24" fill="#d4af37" text-anchor="middle" font-weight="bold">Интеграция оркестра</text>
  <text x="400" y="75" font-family="Georgia, serif" font-size="14" fill="#d4af37" text-anchor="middle" opacity="0.8">Когда все играют вместе - получается музыка</text>
</svg>




