<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" style="background: #ebe8e1;">
  <defs>
    <linearGradient id="lakeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6d9a8f;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#8fae88;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="waterfallGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#6d9a8f;stop-opacity:0.7" />
    </linearGradient>
  </defs>
  
  <!-- Фон -->
  <rect x="0" y="0" width="800" height="600" fill="#ebe8e1"/>
  
  <!-- Зона 1: Озеро (0-30%) -->
  <ellipse cx="150" cy="450" rx="120" ry="80" fill="url(#lakeGradient)"/>
  <text x="150" y="420" font-family="Georgia, serif" font-size="16" fill="#1c261f" text-anchor="middle" font-weight="bold">0-30%</text>
  <text x="150" y="440" font-family="Georgia, serif" font-size="14" fill="#1c261f" text-anchor="middle">Зона спокойствия</text>
  <text x="150" y="460" font-family="Georgia, serif" font-size="12" fill="#1c261f" text-anchor="middle">Озеро</text>
  
  <!-- Зона 2: Комфорт (30-60%) -->
  <ellipse cx="300" cy="400" rx="100" ry="70" fill="#8fae88" opacity="0.5"/>
  <text x="300" y="375" font-family="Georgia, serif" font-size="16" fill="#1c261f" text-anchor="middle" font-weight="bold">30-60%</text>
  <text x="300" y="395" font-family="Georgia, serif" font-size="14" fill="#1c261f" text-anchor="middle">Зона комфорта</text>
  
  <!-- Зона 3: Предупреждение (60-80%) -->
  <ellipse cx="500" cy="350" rx="90" ry="60" fill="#ff6b35" opacity="0.6"/>
  <text x="500" y="330" font-family="Georgia, serif" font-size="16" fill="#ffffff" text-anchor="middle" font-weight="bold">60-80%</text>
  <text x="500" y="350" font-family="Georgia, serif" font-size="14" fill="#ffffff" text-anchor="middle">Зона предупреждения</text>
  <text x="500" y="370" font-family="Georgia, serif" font-size="12" fill="#ffffff" text-anchor="middle">Волны выше</text>
  
  <!-- Зона 4: Водопад (80-100%) -->
  <rect x="650" y="100" width="100" height="400" fill="url(#waterfallGradient)"/>
  <path d="M 650 100 L 700 120 L 750 100 L 700 150 L 650 130 Z" fill="#ffffff" opacity="0.8"/>
  <text x="700" y="90" font-family="Georgia, serif" font-size="16" fill="#1c261f" text-anchor="middle" font-weight="bold">80-100%</text>
  <text x="700" y="110" font-family="Georgia, serif" font-size="14" fill="#1c261f" text-anchor="middle">Зона невозврата</text>
  <text x="700" y="130" font-family="Georgia, serif" font-size="12" fill="#1c261f" text-anchor="middle">Водопад</text>
  
  <!-- Стрелка прогрессии -->
  <path d="M 150 450 Q 400 300, 700 300" stroke="#d4af37" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#d4af37"/>
    </marker>
  </defs>
  
  <!-- Заголовок -->
  <text x="400" y="50" font-family="Georgia, serif" font-size="22" fill="#1c261f" text-anchor="middle" font-weight="bold">Зоны возбуждения</text>
  <text x="400" y="75" font-family="Georgia, serif" font-size="14" fill="#666" text-anchor="middle">От спокойного озера до неудержимого водопада</text>
</svg>




